<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" role="img" aria-labelledby="title desc">
  <title id="title">HDDF Logo</title>
  <desc id="desc">Laptop in front of High Desert mountains with sunrise.</desc>
  <defs>
    <linearGradient id="sun" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f7b35a" />
      <stop offset="1" stop-color="#dd7f1f" />
    </linearGradient>
    <linearGradient id="mount" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ef9e47" />
      <stop offset="1" stop-color="#9f471f" />
    </linearGradient>
  </defs>

  <rect width="900" height="700" fill="#f3ecde" />
  <path d="M170 390 A280 230 0 0 1 730 390" fill="none" stroke="#0e5561" stroke-width="10" />

  <circle cx="450" cy="270" r="90" fill="url(#sun)" />
  <g stroke="#ef9e47" stroke-width="6">
    <line x1="450" y1="130" x2="450" y2="95" />
    <line x1="390" y1="145" x2="370" y2="113" />
    <line x1="510" y1="145" x2="530" y2="113" />
    <line x1="345" y1="190" x2="314" y2="170" />
    <line x1="555" y1="190" x2="586" y2="170" />
  </g>

  <path d="M190 390 C235 320 290 300 340 390 Z" fill="url(#mount)" />
  <path d="M305 390 C380 285 460 275 555 390 Z" fill="#f3c772" />
  <path d="M500 390 C560 300 625 300 710 390 Z" fill="url(#mount)" />

  <rect x="285" y="250" width="330" height="180" rx="20" fill="#0e5561" />
  <rect x="305" y="270" width="290" height="140" rx="8" fill="#f0e8cc" />
  <circle cx="450" cy="262" r="4" fill="#f3ecde" />
  <path d="M285 430 H615 L650 455 H250 Z" fill="#0e5561" />
  <path d="M250 455 H650 C640 470 625 478 605 478 H295 C275 478 260 470 250 455Z" fill="#083740" />

  <text x="450" y="575" text-anchor="middle" font-family="League Spartan, Montserrat, Arial, sans-serif" font-size="120" font-weight="800" fill="#0e5561">HDDF</text>
  <text x="450" y="625" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="42" font-weight="700" letter-spacing="2" fill="#0e5561">HIGH DESERT DIGITAL FUTURE</text>
</svg>
